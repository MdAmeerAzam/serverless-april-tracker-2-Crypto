name: Backup — Supabase to Sheets

on:
  schedule:
    - cron: '2,17,32,47 * * * *'
  workflow_dispatch:

concurrency:
  group: crypto-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Backup Supabase to Sheets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
      - name: Run Backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/run_backup.js
