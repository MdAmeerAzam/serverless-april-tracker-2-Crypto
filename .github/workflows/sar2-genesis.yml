name: SAR 2 True Genesis
on:
  # STOPPED — June 10, 2026. SAR2 Genesis hourly cron disabled.
  # Replaced by local genesis engine. Manual dispatch only.
  workflow_dispatch:
jobs:
  genesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/run_sar2_genesis.js
        env:
          DATABASE_URL: ${{ secrets.PGURI }}
          BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
          BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
