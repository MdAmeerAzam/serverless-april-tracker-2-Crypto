name: Cloud Sync & Backup

on:
  # TEMPORARILY STOPPED — June 10, 2026. Crons disabled pending genesis + new sync scripts.
  # Will be re-enabled after Phases G1-G5 complete.
  workflow_dispatch:

concurrency:
  group: cloud-sync-repo2
  cancel-in-progress: true
jobs:
  sync:
    name: Sync Bybit → Supabase
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && (github.event.schedule == '0,15,30,45 * * * *'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Run Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
          BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
        run: node scripts/run_sync.js

  backup:
    name: Backup Supabase → Sheets
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && (github.event.schedule == '2,17,32,47 * * * *'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
      - name: Run Backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/run_backup.js

  watchdog:
    name: Crypto Cloud WATCHDOG
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '5 * * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Run Audit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/run_watchdog.js
